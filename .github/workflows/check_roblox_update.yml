name: Roblox Update Checker

on:
  schedule:
    - cron: '*/60 * * * *' # S'exécute toutes les 60 minutes
  workflow_dispatch:      # Permet de le lancer manuellement pour tester

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch Latest Roblox Version
        run: |
          curl -s https://setup.rbxcdn.com/version > current_version.txt
          echo "LATEST_VERSION=$(cat current_version.txt)" >> $GITHUB_ENV

      - name: Compare Versions
        id: check
        run: |
          if [ ! -f RobloxVersion.txt ]; then touch RobloxVersion.txt; fi
          if cmp -s current_version.txt RobloxVersion.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            mv current_version.txt RobloxVersion.txt
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload Version File
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: roblox-version-file
          path: RobloxVersion.txt

  discord-post:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Version File
        uses: actions/download-artifact@v4
        with:
          name: roblox-version-file

      - name: Commit and Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add RobloxVersion.txt
          git commit -m "New roblox version detected"
          git push

      - name: Send Discord Webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # On lit la version directement dans le fichier téléchargé
          VERSION=$(cat RobloxVersion.txt)
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 **Nouvelle mise à jour Roblox !**\nVersion : \`$VERSION\`\"}" \
          $DISCORD_WEBHOOK